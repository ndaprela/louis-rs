name: SBOM and Security  
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
jobs:  
  sbom:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
      - name: Generate SBOM  
        run: |  
          cargo install cargo-cyclonedx  
          cargo cyclonedx --format json --output sbom.json  
      - name: Upload SBOM  
        uses: actions/upload-artifact@v4
        with:  
          name: sbom  
          path: sbom.json
